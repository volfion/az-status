name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build Release configuration
        run: |
          xcodebuild             -project AZRouterMenu.xcodeproj             -target "AZ Status"             -configuration Release             -derivedDataPath build             CODE_SIGNING_ALLOWED=NO             clean build
