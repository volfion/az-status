name: Bug report
description: Report a reproducible AZ Status problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include passwords, local IP addresses, serial numbers, or unredacted API responses."
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: AZ Status version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
